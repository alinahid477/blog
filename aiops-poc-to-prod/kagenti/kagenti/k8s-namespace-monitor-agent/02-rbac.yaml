---
# ServiceAccount used by both the CronJob and A2A Deployment pods.
# The agent itself only needs to reach the MCP server's HTTP endpoint —
# all cluster API access is handled by the MCP server's own ServiceAccount.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-namespace-monitor-agent
  namespace: agents
  labels:
    app: k8s-namespace-monitor-agent
    kagenti.io/type: agent
imagePullSecrets:
- name: quay-pull-secret
---
# Secret holding sensitive runtime credentials (tokens and API keys only).
# MCP_SERVER_URL is a plain URL — set it as a normal env var in deployment.yaml.
#
# Prefer creating this via CLI (avoids committing real values):
#   kubectl create secret generic k8s-namespace-monitor-secrets \
#     --from-literal=TELEGRAM_BOT_TOKEN=<your-token> \
#     --from-literal=OPENAI_API_KEY=<your-api-key> \
#     -n agents
#
# The manifest below is a reference template — do NOT commit real values.
# apiVersion: v1
# kind: Secret
# metadata:
#   name: k8s-namespace-monitor-secrets
#   namespace: agents
# type: Opaque
# stringData:
#   TELEGRAM_BOT_TOKEN: "REPLACE_ME"
#   OPENAI_API_KEY: "REPLACE_ME"
