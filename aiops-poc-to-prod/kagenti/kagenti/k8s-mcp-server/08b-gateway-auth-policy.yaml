apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: mcp-auth-policy
  namespace: gateway-system
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: mcp-gateway
    sectionName: mcp
  defaults:
    when:
      - predicate: "!request.path.contains('/.well-known')"
    rules:
      authentication:
        'keycloak':
          jwt:
            issuerUrl: https://keycloak-keycloak.apps.<your-cluster-domain>/realms/kagenti
      response:
        unauthenticated:
          code: 401
          headers:
            'WWW-Authenticate':
              value: >-
                Bearer resource_metadata=https://mcp-gateway-gateway-system.apps.<your-cluster-domain>/.well-known/oauth-protected-resource/mcp
          body:
            value: |
              {
                "error": "Unauthorized",
                "message": "Authentication required."
              }