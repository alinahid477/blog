apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: openclaw
  ports:
  - name: gateway
    port: 18789
    targetPort: gateway
    protocol: TCP
  # Bridge port (inter-process in Docker Compose; exposed here for completeness
  # but not routed via the OpenShift Route)
  - name: bridge
    port: 18790
    targetPort: bridge
    protocol: TCP
