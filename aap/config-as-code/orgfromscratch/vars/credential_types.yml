controller_credential_types:
  - name: Red Hat Insights Offline Token
    kind: cloud
    description: "Offline token for authenticating with the Red Hat console.redhat.com APIs (Insights, Automation Hub, etc.)"
    inputs:
      fields:
        - id: insights_offline_token
          type: string
          label: Red Hat Insights Offline Token
          secret: true
      required:
        - insights_offline_token
    injectors:
      extra_vars:
        insights_offline_token: "{  { insights_offline_token }}"
