controller_credentials:
  - name: alinahid477-github-secret
    organization: anahid-org
    credential_type: Source Control
    inputs:
      username: alinahid477
      password: "{{ github_pat }}"

  - name: insights-offline-token
    organization: anahid-org
    credential_type: Red Hat Insights Offline Token
    inputs:
      insights_offline_token: "{{ insight_offline_token }}"

  - name: rh-insights-creds
    organization: anahid-org
    credential_type: Insights
    inputs:
      client_id: "{{ insights_client_id }}"
      client_secret: "{{ insights_client_secret }}"

  - name: rhel-ssh-key
    organization: anahid-org
    credential_type: Machine
    inputs:
      username: "{{ rhel_ssh_username }}"
      ssh_key_data: "{{ rhel_ssh_private_key }}"
